<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  padding:40px 15px;
}

.card{
  background:#ffffff;
  width:100%;
  max-width:600px;
  padding:25px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.card h2{
  margin-top:0;
  text-align:center;
}

.card h3{
  margin-top:30px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.pay-row{
  background:#f9fafb;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  font-size:14px;
}

/* BUTTON GROUP */
.btn-group{
  display:flex;
  gap:10px;
  margin-top:20px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  cursor:pointer;
}

/* Back button */
.back-btn{
  background:#6b7280;
  color:white;
}

/* New Trip button */
.new-btn{
  background:#2563eb;
  color:white;
}

button:hover{
  opacity:0.9;
}

@media (max-width:480px){
  .row,.pay-row{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="card">
<h2 id="tripTitle"></h2>

<div id="summary"></div>

<h3>Who Should Pay Whom</h3>
<div id="settlements"></div>

<div class="btn-group">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <button class="new-btn" onclick="newTrip()">Start New Trip</button>
</div>

</div>

<script>
let tripName = localStorage.getItem("tripName");
let members = JSON.parse(localStorage.getItem("members"));
let expenses = JSON.parse(localStorage.getItem("expenses"));

if(!tripName || !members || !expenses){
  alert("No trip data found!");
  window.location="index.html";
}

document.getElementById("tripTitle").innerText = "Trip: " + tripName;

// ---- BASIC CALCULATION ----
let total = expenses.reduce((s,e)=>s+e.amount,0);
let perPerson = total / members.length;

let paid = {};
members.forEach(m => paid[m] = 0);
expenses.forEach(e => paid[e.by] += e.amount);

let html = `
<p><b>Total Expense:</b> ₹${total.toFixed(0)}</p>
<p><b>Per Person:</b> ₹${perPerson.toFixed(0)}</p>
<hr>
`;

let balances = [];

for(let m in paid){
  let balance = paid[m] - perPerson;
  html += `
    <div class="row">
      <span>${m}</span>
      <b>${balance >= 0 ? "+₹"+balance.toFixed(0) : "-₹"+Math.abs(balance).toFixed(0)}</b>
    </div>
  `;
  balances.push({name:m, balance:balance});
}

document.getElementById("summary").innerHTML = html;

// ---- PAY WHO LOGIC ----
let payers = balances.filter(p => p.balance < 0);
let receivers = balances.filter(p => p.balance > 0);

let settlementHTML = "";

let i=0, j=0;
while(i < payers.length && j < receivers.length){
  let payAmount = Math.min(
    Math.abs(payers[i].balance),
    receivers[j].balance
  );

  settlementHTML += `
    <div class="pay-row">
       <b>${payers[i].name}</b> should pay 
      <b>₹${payAmount.toFixed(0)}</b> to 
      <b>${receivers[j].name}</b>
    </div>
  `;

  payers[i].balance += payAmount;
  receivers[j].balance -= payAmount;

  if(Math.abs(payers[i].balance) < 1) i++;
  if(Math.abs(receivers[j].balance) < 1) j++;
}

document.getElementById("settlements").innerHTML =
  settlementHTML || "<p>All settled ✔</p>";

function newTrip(){
  localStorage.clear();
  window.location="index.html";
}

function goBack(){
  window.location="dashboard.html"; // change if your page name is different
}
</script>

</body>
</html>
