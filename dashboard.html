<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  background:#f3f4f6;
}

/* ===== HEADER ===== */
.header{
  width:100%;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,#2563eb,#1e3a8a);
  color:white;
}

.header h2{
  margin:0;
}

.header button{
  background:white;
  color:#1e3a8a;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

/* ===== CONTAINER ===== */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 15px;
  gap:20px;
}

/* ===== CARD ===== */
.card{
  background:#ffffff;
  width:100%;
  max-width:550px;
  padding:20px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.card h3{
  margin-top:0;
  margin-bottom:15px;
}

/* ===== INPUTS ===== */
input,select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:14px;
}

input:focus,select:focus{
  border-color:#2563eb;
  outline:none;
}

/* ===== MAIN BUTTON ===== */
.card > button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:14px;
  cursor:pointer;
}

.card > button:hover{
  opacity:0.9;
}

/* ===== EXPENSE LIST ===== */
.expense{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
  flex-wrap:wrap;
}

/* BUTTON GROUP */
.expense span{
  display:flex;
  gap:8px;
}

/* SMALL BUTTONS */
.small-btn{
  background:#2563eb;
  color:white;
  padding:6px 12px;
  font-size:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:auto;
}

.small-btn:hover{
  opacity:0.85;
}

/* END TRIP BUTTON */
.end-btn{
  width:100%;
  background:#ef4444;
  color:white;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.end-btn:hover{
  opacity:0.9;
}

/* ===== RESPONSIVE ===== */
@media (max-width:480px){
  .expense{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h2 id="title"></h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
<h3>Add Expense</h3>

<select id="descSelect" onchange="checkOther()">
  <option value="">-- Select Description --</option>
  <option>Food</option>
  <option>Travel</option>
  <option>Hotel</option>
  <option>Shopping</option>
  <option>Fuel</option>
  <option>Tickets</option>
  <option>Other</option>
</select>

<input id="otherDesc" placeholder="Enter custom description" style="display:none">

<input id="amount" type="number" placeholder="Amount">

<select id="paidBy"></select>

<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3>Expenses</h3>
<div id="list"></div>
</div>

<div class="card">
<button class="end-btn" onclick="endTrip()">End Trip</button>
</div>

</div>

<script>
let tripName=localStorage.getItem("tripName");
if(!tripName)location="index.html";
document.getElementById("title").innerText=tripName;

let members=JSON.parse(localStorage.getItem("members"));
let expenses=JSON.parse(localStorage.getItem("expenses"));

members.forEach(m=>{
 let opt=document.createElement("option");
 opt.text=m;
 document.getElementById("paidBy").add(opt);
});

function checkOther(){
 let sel=document.getElementById("descSelect").value;
 document.getElementById("otherDesc").style.display = (sel==="Other")?"block":"none";
}

function render(){
 let list=document.getElementById("list");
 list.innerHTML="";
 expenses.forEach((e,i)=>{
  list.innerHTML+=`
  <div class="expense">
    ${e.desc} ₹${e.amount} (${e.by})
    <span>
      <button class="small-btn" onclick="editExpense(${i})">EDIT</button>
      <button class="small-btn" onclick="del(${i})">DELETE</button>
    </span>
  </div>`;
 });
 localStorage.setItem("expenses",JSON.stringify(expenses));
}

function addExpense(){
 let sel=document.getElementById("descSelect").value;
 let desc = sel==="Other" ? document.getElementById("otherDesc").value : sel;
 let amt=+amount.value;
 let by=paidBy.value;

 if(desc===""||amt<=0){alert("Fill all fields");return;}

 expenses.push({desc:desc,amount:amt,by:by});
 render();

 document.getElementById("descSelect").value="";
 document.getElementById("otherDesc").value="";
 document.getElementById("otherDesc").style.display="none";
 amount.value="";
}

function del(i){
 expenses.splice(i,1);
 render();
}

function editExpense(i){
 let e=expenses[i];
 let d=prompt("Description",e.desc);
 let a=prompt("Amount",e.amount);
 expenses[i]={desc:d,amount:+a,by:e.by};
 render();
}

function endTrip(){
 window.location="summary.html";
}

function logout(){
 localStorage.clear();
 window.location="trip.html";
}

render();
</script>

</body>
</html>
