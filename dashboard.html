<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&amp;display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;color:white}
.header{display:flex;justify-content:space-between;align-items:center}
.card{background:rgba(255,255,255,0.15);backdrop-filter:blur(15px);padding:20px;border-radius:20px;margin-top:15px}
input,select{width:100%;padding:10px;border-radius:10px;border:none;margin:5px 0}
button{padding:8px 15px;border:none;border-radius:20px;background:#ff4b2b;color:white;cursor:pointer}
.expense{display:flex;justify-content:space-between;align-items:center;margin-top:6px;background:rgba(255,255,255,0.2);padding:8px;border-radius:10px}
.small-btn{padding:4px 8px;font-size:12px}
</style>
</head>
<body>

<div class="header">
<h2 id="title"></h2>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Add Expense</h3>

<select id="descSelect" onchange="checkOther()">
  <option value="">-- Select Description --</option>
  <option>Food</option>
  <option>Travel</option>
  <option>Hotel</option>
  <option>Shopping</option>
  <option>Fuel</option>
  <option>Tickets</option>
  <option>Other</option>
</select>

<input id="otherDesc" placeholder="Enter custom description" style="display:none">

<input id="amount" type="number" placeholder="Amount">

<select id="paidBy"></select>

<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3>Expenses</h3>
<div id="list"></div>
</div>

<div class="card">
<button onclick="endTrip()">End Trip</button>
</div>

<script>
let tripName=localStorage.getItem("tripName");
if(!tripName)location="index.html";
document.getElementById("title").innerText=tripName;

let members=JSON.parse(localStorage.getItem("members"));
let expenses=JSON.parse(localStorage.getItem("expenses"));

members.forEach(m=>{
 let opt=document.createElement("option");
 opt.text=m;
 document.getElementById("paidBy").add(opt);
});

function checkOther(){
 let sel=document.getElementById("descSelect").value;
 document.getElementById("otherDesc").style.display = (sel==="Other")?"block":"none";
}

function render(){
 let list=document.getElementById("list");
 list.innerHTML="";
 expenses.forEach((e,i)=>{
  list.innerHTML+=`
  <div class="expense">
    ${e.desc} ₹${e.amount} (${e.by})
    <span>
      <button class="small-btn" onclick="editExpense(${i})">EDIT</button>
      <button class="small-btn" onclick="del(${i})">DELETE</button>
    </span>
  </div>`;
 });
 localStorage.setItem("expenses",JSON.stringify(expenses));
}

function addExpense(){
 let sel=document.getElementById("descSelect").value;
 let desc = sel==="Other" ? document.getElementById("otherDesc").value : sel;
 let amt=+amount.value;
 let by=paidBy.value;

 if(desc===""||amt<=0){alert("Fill all fields");return;}

 expenses.push({desc:desc,amount:amt,by:by});
 render();

 // ✅ CLEAR FORM AFTER ADD
 document.getElementById("descSelect").value="";
 document.getElementById("otherDesc").value="";
 document.getElementById("otherDesc").style.display="none";
 amount.value="";
}

function del(i){
 expenses.splice(i,1);
 render();
}

function editExpense(i){
 let e=expenses[i];
 let d=prompt("Description",e.desc);
 let a=prompt("Amount",e.amount);
 expenses[i]={desc:d,amount:+a,by:e.by};
 render();
}

function endTrip(){
 window.location="summary.html";
}

function logout(){
 localStorage.clear();
 window.location="index.html";
}

render();
</script>
</body>
</html>
